<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Carros Cadastrados</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        button { padding: 5px 10px; margin: 5px; cursor: pointer; }
        .delete { background-color: #ff4444; color: white; }
        .edit { background-color: #4444ff; color: white; }
        .create { background-color: #44ff44; color: black; }
        form { margin-bottom: 20px; padding: 10px; border: 1px solid #ccc; }
        input { margin: 5px; padding: 5px; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        th { background-color: #f0f0f0; }
    </style>
</head>
<body>
    <h1>Dashboard de Carros</h1>

    <!-- Formulário para criar/editar carro -->
    <form id="carForm">
        <h2>Adicionar/Editar Carro</h2>
        <input type="hidden" id="carId" />
        <input type="text" id="carName" placeholder="Nome" required>
        <input type="text" id="carColor" placeholder="Cor" required>
        <input type="text" id="carBrand" placeholder="Marca" required>
        <button type="button" class="create" onclick="saveCar()">Salvar</button>
        <button type="button" onclick="resetForm()">Limpar</button>
    </form>

    <!-- Tabela de carros -->
    <h2>Carros Cadastrados</h2>
    <table id="carsTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Cor</th>
                <th>Marca</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="carsBody">
        </tbody>
    </table>

    <script>
        // Carregar carros ao abrir a página
        window.onload = function() {
            loadCars();
        };

        // Buscar todos os carros
        function loadCars() {
            fetch('/api/cars')
                .then(response => response.json())
                .then(data => {
                    const tbody = document.getElementById('carsBody');
                    tbody.innerHTML = '';
                    
                    if (data.cars && Array.isArray(data.cars)) {
                        data.cars.forEach(car => {
                            const row = document.createElement('tr');
                            row.innerHTML = `
                                <td>${car.id}</td>
                                <td>${car.name}</td>
                                <td>${car.color}</td>
                                <td>${car.brand}</td>
                                <td>
                                    <button class="edit" onclick="editCar('${car.id}', '${car.name}', '${car.color}', '${car.brand}')">Editar</button>
                                    <button class="delete" onclick="deleteCar('${car.id}')">Deletar</button>
                                </td>
                            `;
                            tbody.appendChild(row);
                        });
                    }
                })
                .catch(error => {
                    console.error('Erro ao carregar carros:', error);
                    alert('Erro ao carregar carros');
                });
        }

        // Salvar novo carro ou atualizar existente
        function saveCar() {
            const id = document.getElementById('carId').value;
            const name = document.getElementById('carName').value;
            const color = document.getElementById('carColor').value;
            const brand = document.getElementById('carBrand').value;

            if (!name || !color || !brand) {
                alert('Preencha todos os campos!');
                return;
            }

            const car = { id: id || null, name, color, brand };
            const method = id ? 'PUT' : 'POST';
            const url = id ? `/api/cars/${id}` : '/api/cars';

            fetch(url, {
                method: method,
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(car)
            })
            .then(response => {
                if (response.ok) {
                    alert(id ? 'Carro atualizado com sucesso!' : 'Carro criado com sucesso!');
                    resetForm();
                    loadCars();
                } else {
                    alert('Erro ao salvar carro');
                }
            })
            .catch(error => {
                console.error('Erro:', error);
                alert('Erro ao salvar carro');
            });
        }

        // Deletar carro
        function deleteCar(id) {
            if (confirm('Tem certeza que deseja deletar este carro?')) {
                fetch(`/api/cars/${id}`, {
                    method: 'DELETE'
                })
                .then(response => {
                    if (response.ok) {
                        alert('Carro deletado com sucesso!');
                        loadCars();
                    } else {
                        alert('Erro ao deletar carro');
                    }
                })
                .catch(error => {
                    console.error('Erro:', error);
                    alert('Erro ao deletar carro');
                });
            }
        }

        // Preencher formulário para editar
        function editCar(id, name, color, brand) {
            document.getElementById('carId').value = id;
            document.getElementById('carName').value = name;
            document.getElementById('carColor').value = color;
            document.getElementById('carBrand').value = brand;
            document.getElementById('carName').focus();
        }

        // Limpar formulário
        function resetForm() {
            document.getElementById('carForm').reset();
            document.getElementById('carId').value = '';
        }
    </script>
</body>
</html>
